repos:
  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # frozen: v2.4.2
    hooks:
      - id: codespell
        priority: 0
        language: python # means renovate will update the `additional_dependencies` for the hook
        additional_dependencies: ["tomli==2.4.1"]
  - repo: https://github.com/alan-turing-institute/CleverCSV-pre-commit
    rev: be5b6329e32e3ac22a4b90b1315df9d831e0c3dc # frozen: v0.8.5
    hooks:
      - id: clevercsv-standardize
        priority: 0
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: 4b2e70d08cb2ccd26d1fba73588de41c7a5d50b7 # frozen: v0.25
    hooks:
      - id: validate-pyproject
        priority: 0
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815 # frozen: v1.26.1
    hooks:
      - id: zizmor
        priority: 0
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 6b63472e72e1a91ed8a2f6d483790dfb644fa1d3 # frozen: 0.37.4
    hooks:
      - id: check-github-workflows
        priority: 0
      - id: check-renovate
        priority: 0
        language: python # means renovate will update the `additional_dependencies` for the hook
        additional_dependencies:
          - "json5==0.15.0"
  # `actionlint` hook, for verifying correct syntax in GitHub Actions workflows.
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint
        priority: 0
        language: golang # means renovate will also update `additional_dependencies`
        additional_dependencies:
          # actionlint has a shellcheck integration which extracts shell scripts in `run:` steps from GitHub Actions
          # and checks these with shellcheck. This is arguably its most useful feature,
          # but the integration only works if shellcheck is installed
          - "github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1"
  - repo: meta
    hooks:
      - id: check-hooks-apply
        priority: 0
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-yaml
        priority: 0
      - id: check-toml
        priority: 0
      - id: check-json
        priority: 0
      - id: check-merge-conflict
        priority: 0
      - id: check-case-conflict
        priority: 0
      - id: name-tests-test
        args: [--pytest-test-first]
        priority: 0
      - id: trailing-whitespace
        priority: 1
      - id: end-of-file-fixer
        priority: 2
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: a4d5d37e66ebcd6b3705204a1d6dbb56dea66338 # frozen: v0.49.0
    hooks:
      - id: markdownlint
        priority: 0
        args: ["--ignore", "stats_website/.snippets"]
      - id: markdownlint-fix
        priority: 3
        args: ["--ignore", "stats_website/.snippets"]
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: 06507ab9500d4a9919b5ebd76d9d5b7074f15c1f # frozen: v3.8.4
    hooks:
      - id: prettier
        priority: 3
        exclude: "^examples/.*"
        exclude_types: ["markdown"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: c59bba8fb259db0fec2bbb77ad8ba51ea7341b56 # frozen: v0.15.20
    hooks:
      - id: ruff-check
        priority: 3
      - id: ruff-format
        priority: 4
        types_or:
          - python
          - pyi
          - markdown
  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: a2c42a517f3f505d7ffebb9a68fa41ac3a2dec4a # frozen: v0.0.62
    hooks:
      - id: ty
        priority: 0
        args: [--isolated]

ci:
  autofix_commit_msg: "[pre-commit.ci] auto fixes from pre-commit.com hooks"
  autofix_prs: true
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: quarterly
  submodules: false
