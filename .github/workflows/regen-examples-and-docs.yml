name: Regenerate examples and docs

on:
  schedule:
    - cron: "0 */12 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "tests/**"
      - "examples/**"
      - "**.json"
      - "**.csv"
      - "**.html"
  workflow_dispatch:

env:
  FORCE_COLOR: 1 # Request colored output from CLI tools supporting it
  CLICOLOR_FORCE: 1 # recognized by uv

permissions: {}

jobs:
  regen_examples_and_docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
      - name: git config
        run: |
          git config --global user.name statsabot
          git config --global user.email ''
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.26"
          python-version: "3.14"
      - run: uv sync --group=dev
      - run: uv pip freeze
      - name: Regenerate examples and docs
        id: regen
        run: uv run python scripts/regenerate.py --download-typeshed
      - name: Check the generated files with prek
        id: lint
        run: uvx prek run -a
      - name: Commit and push the changes
        id: commit
        if: >-
          ${{
            github.repository == 'AlexWaygood/typeshed-stats'
            && always()
            && steps.regen.outcome == 'success'
            && steps.lint.outcome == 'success'
          }}
        run: |
          git add examples
          git diff --staged --quiet || git commit -m "👷 Automated regeneration of examples and docs"
          git push
      - name: Deploy docs
        if: >-
          ${{
            github.repository == 'AlexWaygood/typeshed-stats'
            && always()
            && steps.regen.outcome == 'success'
            && steps.lint.outcome == 'success'
            && steps.commit.outcome == 'success'
          }}
        run: uv run mkdocs gh-deploy -m "🚀 Deploying {sha} with MkDocs {version}" --force

  create-issue-on-failure:
    name: Create an issue if the automated regeneration failed
    runs-on: ubuntu-latest
    needs: [regen_examples_and_docs]
    if: >-
      ${{
        github.repository == 'AlexWaygood/typeshed-stats'
        && always()
        && github.event_name == 'schedule'
        && needs.regen_examples_and_docs.result == 'failure'
      }}
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: "AlexWaygood",
              repo: "typeshed-stats",
              title: `Automated regeneration of examples failed on ${new Date().toDateString()}`,
              body: "Run listed here: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            })
